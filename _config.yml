# Mixtape Library Template
# Jekyll configuration

title: "Mixtape Library"
description: "A catalog of cassette mixtapes available for copying and exchange."

# IMPORTANT: Set baseurl to your repository name for GitHub Pages
# If hosted at yourusername.github.io/my-mixtapes/, use: /my-mixtapes/
# If hosted at yourusername.github.io/, use: (empty)
# If hosted at custom domain, use: (empty)
baseurl: "/mixtape-library-template"
url: ""

# Collections
collections:
  tapes:
    output: true
    permalink: /tape/:slug/

# Defaults
defaults:
  - scope:
      path: ""
      type: "tapes"
    values:
      layout: "tape"

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/

# Include
include:
  - _data
