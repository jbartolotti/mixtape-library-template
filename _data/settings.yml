# Site owner settings
# Customize these values to personalize your mixtape library

owner:
  name: "Your Name"
  email: "your.email@example.com"
  bio: "Music enthusiast sharing mixtapes since 199X. Specializing in indie rock, post-punk, and ambient soundscapes."
  
  # Genre preferences for "What I Love" section
  genre_preferences:
    - "New Wave: The Cure, New Order, Depeche Mode"
    - "Indie Rock: Pavement, Guided by Voices, Built to Spill"
    - "Post-Punk: Joy Division, Gang of Four, Wire"
    - "Shoegaze: My Bloody Valentine, Slowdive, Ride"
    - "Ambient: Brian Eno, Stars of the Lid, Tim Hecker"
  
  # Tape types you prefer to receive (use values from tape_options.yml)
  preferred_tape_types:
    - "type_i"
    - "type_ii"
  
  # Dolby options you prefer to receive (use values from tape_options.yml)
  preferred_dolby_options:
    - "none"
    - "dolby_b"

# Exchange policy
policy:
  description: "I'm happy to copy and exchange tapes with fellow enthusiasts! Please read the guidelines below."
  guidelines:
    - "I will ship to X, Y, and Z countries"
    - "Allow 2-4 weeks for processing and shipping"
    - "I prefer 1:1 tape exchanges. If you don't have tapes to exchange, I can provide the tapes for a small fee (see charges below)"
  
  # Monetary policy for special tape types
  charges:
    type_i: "Free for Type I (normal/ferric) per tape"
    type_ii: "$2 for Type II (chrome) per tape (or free for exchanges)"
    type_iv: "Not available"
    shipping: "$5-$10 depending on location and tape quantity with USPS media mail or ground shipping. For exchanges we each cover our own costs."

# Theme customization
theme:
  primary_color: "#e63946"
  secondary_color: "#457b9d"
  background_color: "#f1faee"
  text_color: "#1d3557"
  accent_color: "#a8dadc"
  
  # Optional: header image URL (leave empty for solid color header)
  header_image: ""
  
  # Font choices (Google Fonts or system fonts)
  heading_font: "'Courier New', monospace"
  body_font: "'Helvetica Neue', Arial, sans-serif"

# Site metadata
site:
  show_tape_count: true
  tapes_per_row: 4  # For catalog grid view
  enable_search: true
  enable_filtering: true
