# Tape configuration options
# These define what options are available in the request generator

# Tape types you have available
tape_types:
  - name: "Type I (Normal/Ferric)"
    value: "type_i"
    available: true
    cost: "Free"
  
  - name: "Type II (Chrome)"
    value: "type_ii"
    available: true
    cost: "$2 (or free for exchanges)"
  
  - name: "Type IV (Metal)"
    value: "type_iv"
    available: false
    cost: "$10"

# Dolby noise reduction options you can provide
dolby_options:
  - name: "No Dolby NR"
    value: "none"
    available: true
  
  - name: "Dolby B"
    value: "dolby_b"
    available: true
  
  - name: "Dolby C"
    value: "dolby_c"
    available: true
  
  - name: "Dolby S"
    value: "dolby_s"
    available: true

# Standard tape lengths available
tape_lengths:
  - "45 minutes (Type 1 Only)"
  - "60 minutes (Type 1 Only)"
  - "90 minutes"

# Genre categories for custom requests
genres:
  - "New Wave"
  - "Synth-Pop"
  - "City Pop"
  - "World: Jpop, Kpop, French Pop"
  - "Alternative"
  - "Indie Rock"
  - "Shoegaze"
  - "Electronic"
