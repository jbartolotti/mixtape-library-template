# Tape configuration options
# These define what options are available in the request generator

# Tape types you have available
tape_types:
  - name: "Type I (Normal/Ferric)"
    value: "type_i"
    available: true
    cost: "Free"
  
  - name: "Type II (Chrome)"
    value: "type_ii"
    available: true
    cost: "$2 (or free for exchanges)"
  
  - name: "Type IV (Metal)"
    value: "type_iv"
    available: false
    cost: "$10"

  - name: "Digital File"
    value: "digital_file"
    available: true
    cost: "Free"

# Dolby noise reduction options you can provide
dolby_options:
  - name: "No Dolby NR"
    value: "none"
    available: true
  
  - name: "Dolby B"
    value: "dolby_b"
    available: true
  
  - name: "Dolby C"
    value: "dolby_c"
    available: false
  
  - name: "Dolby S"
    value: "dolby_s"
    available: false

# Standard tape lengths available
tape_lengths:
  - "60 minutes"
  - "90 minutes"
  - "120 minutes"

# Genre categories for custom requests
genres:
  - "Alternative / Indie Rock"
  - "Post-Punk / New Wave"
  - "Shoegaze / Dream Pop"
  - "Electronic / IDM"
  - "Ambient / Experimental"
  - "Hip-Hop / Rap"
  - "R&B / Soul"
  - "Jazz / Fusion"
  - "Folk / Americana"
  - "Metal / Hard Rock"
  - "Punk / Hardcore"
  - "Pop"
  - "Classical"
  - "World Music"
  - "Soundtrack / Score"
  - "Other (specify in notes)"
